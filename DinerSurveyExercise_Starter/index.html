<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Lancaster Diner Survey</title>
        <link href="diner.css" rel="stylesheet" />
        <script src="diner.js"></script>
    </head>

    <body>
        <h1>Restaurant Survey</h1>
        <h2 id="subtitle">
            <!-- filled in by JS -->
        </h2>

        <section id="quality">
            <h3>Quality of Food</h3>
            <div class="result">
                <div class="resultTitle">Ratings</div>
                <div class="ratings">
                    <!-- filled in by JS -->
                </div>
                <div class="resultTitle">Average</div>
                <div class="average">
                    <!-- filled in by JS-->
                </div>
            </div>
        </section>
        <section id="value">
            <h3>Value for Money</h3>
            <div class="result">
                <div class="resultTitle">Ratings</div>
                <div class="ratings"></div>
                <div class="resultTitle">Average</div>
                <div class="average"></div>
            </div>
        </section>
        <section id="service">
            <h3>Quality of Service</h3>
            <div class="result">
                <div class="resultTitle">Ratings</div>
                <div class="ratings"></div>
                <div class="resultTitle">Average</div>
                <div class="average"></div>
            </div>
        </section>
        <section id="atmosphere">
            <h3>Atmosphere</h3>
            <div class="result">
                <div class="resultTitle">Ratings</div>
                <div class="ratings"></div>
                <div class="resultTitle">Average</div>
                <div class="average"></div>
            </div>
        </section>
    </body>
</html>
